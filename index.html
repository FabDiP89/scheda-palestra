    <style>
        html, body { background-color: #0B0F1A; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            color: #F1F5F9;
            -webkit-font-smoothing: antialiased;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .card {
            background: #121826;
            border: 1px solid #2A3348;
            border-radius: 1rem;
        }
        .card-elevated {
            background: linear-gradient(180deg, #1A2030 0%, #141A28 100%);
            border: 1px solid #2A3348;
            border-radius: 1rem;
        }

        /* Animations */
        .fade-in { animation: fadeIn 0.35s ease both; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .expand-in { animation: expandIn 0.3s ease both; }
        @keyframes expandIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
        .slide-up { animation: slideUp 0.3s cubic-bezier(0.32, 0.72, 0, 1) both; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        /* Timer progress */
        .timer-track {
            background: #2A3348;
            border-radius: 999px;
            overflow: hidden;
            height: 6px;
        }
        .timer-fill {
            height: 100%;
            background: linear-gradient(90deg, #A3E635, #FBBF24);
            width: 0%;
            transition: width 1s linear;
        }

        input[type="number"], input[type="date"] {
            -moz-appearance: textfield;
            appearance: textfield;
            color-scheme: dark;
        }
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none; margin: 0;
        }

        .pressable { transition: transform 120ms ease, background-color 200ms ease, border-color 200ms ease, color 200ms ease; }
        .pressable:active { transform: scale(0.97); }

        @keyframes accentPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(163,230,53,0.5); }
            50%      { box-shadow: 0 0 0 8px rgba(163,230,53,0); }
        }
        .ready-pulse { animation: accentPulse 1.2s ease-out 2; }

        .set-complete {
            border-color: rgba(163, 230, 53, 0.5) !important;
            box-shadow: 0 0 0 1px rgba(163, 230, 53, 0.2), 0 4px 24px -8px rgba(163, 230, 53, 0.18);
        }
        .set-complete .set-badge {
            background: rgba(163, 230, 53, 0.14) !important;
            border-color: rgba(163, 230, 53, 0.4) !important;
            color: #A3E635 !important;
        }
        .set-bump { animation: setBump 0.4s ease-out; }
        @keyframes setBump {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.18); }
            100% { transform: scale(1); }
        }

        /* Bottom nav */
        .bottom-tab {
            position: relative;
            color: #64748B;
            transition: color 200ms ease;
            min-height: 56px;
        }
        .bottom-tab[aria-selected="true"] {
            color: #A3E635;
        }
        .bottom-tab[aria-selected="true"]::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 28px; height: 3px;
            background: #A3E635;
            border-radius: 0 0 3px 3px;
            box-shadow: 0 0 12px rgba(163,230,53,0.6);
        }

        /* Modal */
        .modal-content {
            background: #121826;
        }
        @media (min-width: 640px) {
            .modal-content { border-radius: 1.25rem; }
        }
        .modal-content h4 {
            color: #F1F5F9;
            font-weight: 700;
            font-size: 0.875rem;
            margin: 0 0 0.5rem;
        }
        .modal-content ul, .modal-content ol {
            margin: 0 0 0.5rem;
            padding-left: 1.25rem;
            color: #CBD5E1;
            font-size: 0.875rem;
            line-height: 1.55;
        }
        .modal-content ol { list-style: decimal; }
        .modal-content ul { list-style: disc; }
        .modal-content li { margin-bottom: 0.3rem; }
        .modal-content p {
            color: #CBD5E1;
            font-size: 0.875rem;
            line-height: 1.55;
            margin: 0 0 0.6rem;
        }
        .modal-content table {
            width: 100%;
            font-size: 0.8125rem;
            border-collapse: collapse;
            margin: 0.4rem 0 0.8rem;
        }
        .modal-content th, .modal-content td {
            padding: 0.4rem 0.6rem;
            border: 1px solid #2A3348;
            text-align: left;
            color: #CBD5E1;
        }
        .modal-content th {
            background: #1A2030;
            color: #F1F5F9;
            font-weight: 600;
        }
        .modal-content blockquote {
            border-left: 3px solid #A3E635;
            background: rgba(163,230,53,0.06);
            padding: 0.6rem 0.9rem;
            margin: 0.5rem 0;
            color: #F1F5F9;
            font-size: 0.875rem;
            border-radius: 0 0.5rem 0.5rem 0;
        }
        .modal-content code {
            background: #1A2030;
            padding: 0.05rem 0.35rem;
            border-radius: 0.25rem;
            font-size: 0.825em;
            color: #A3E635;
        }

        /* Accordion */
        .accordion-btn[aria-expanded="true"] .accordion-chevron { transform: rotate(180deg); }
        .accordion-chevron { transition: transform 0.2s ease; }

        /* Number tab badge */
        .day-number {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 1.25rem;
            line-height: 1;
        }

        /* Generic content tables (panoramica) */
        .prose-table {
            width: 100%;
            font-size: 0.8125rem;
            border-collapse: collapse;
        }
        .prose-table th, .prose-table td {
            padding: 0.5rem 0.7rem;
            border: 1px solid #2A3348;
            text-align: left;
            color: #CBD5E1;
            vertical-align: top;
        }
        .prose-table th {
            background: #1A2030;
            color: #F1F5F9;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }
        .prose-table .num { text-align: right; font-variant-numeric: tabular-nums; font-family: 'JetBrains Mono', monospace; }
    </style>
</head>

        // ============================================================
        //  AUDIO
        // ============================================================
        function getAudioCtx() {
            if (!audioCtx) {
                try {
                    const Ctx = window.AudioContext || window.webkitAudioContext;
                    if (Ctx) audioCtx = new Ctx();
                } catch (e) { console.warn('Audio non disponibile:', e); }
            }
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            return audioCtx;
        }
        function beep(freq, duration = 0.15, volume = 0.4) {
            const ctx = getAudioCtx();
            if (!ctx) return;
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.type = 'sine';
            osc.frequency.value = freq;
            osc.connect(gain);
            gain.connect(ctx.destination);
            const now = ctx.currentTime;
            gain.gain.setValueAtTime(0, now);
            gain.gain.linearRampToValueAtTime(volume, now + 0.012);
            gain.gain.linearRampToValueAtTime(volume * 0.6, now + duration * 0.55);
            gain.gain.linearRampToValueAtTime(0, now + duration);
            osc.start(now);
            osc.stop(now + duration + 0.04);
        }
        function beepWarning() {
            beep(990, 0.13, 0.5);
            setTimeout(() => beep(660, 0.22, 0.5), 180);
        }
        function beepReady() {
            beep(880, 0.12, 0.5);
            setTimeout(() => beep(1100, 0.12, 0.5), 130);
            setTimeout(() => beep(1320, 0.22, 0.5), 260);
        }

        // ============================================================

        // ============================================================
        async function acquireWakeLock() {
            if (!('wakeLock' in navigator)) return;
            if (wakeLockSentinel) return;
            try {
                wakeLockSentinel = await navigator.wakeLock.request('screen');
                wakeLockSentinel.addEventListener('release', () => { wakeLockSentinel = null; });
            } catch (e) { console.warn('Wake Lock non acquisito:', e); }
        }
        async function maybeReleaseWakeLock() {
            if (Object.keys(activeTimers).length > 0) return;
            if (!wakeLockSentinel) return;
            try { await wakeLockSentinel.release(); } catch (e) {}
            wakeLockSentinel = null;
        }
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible'
                && Object.keys(activeTimers).length > 0
                && !wakeLockSentinel) {
                acquireWakeLock();
            }
        });

        function getSetCount(exId) { return setProgress[exId] || 0; }

        window.adjustSets = function(exId, delta, totalSets) {
            const next = Math.max(0, Math.min(totalSets, getSetCount(exId) + delta));
            setProgress[exId] = next;
            updateSetUI(exId, totalSets, false);
        };

        function incrementSet(exId, totalSets) {
            const current = getSetCount(exId);
            if (current >= totalSets) return;
            setProgress[exId] = current + 1;
            updateSetUI(exId, totalSets, true);
        }

        function updateSetUI(exId, totalSets, animate) {
            const count = getSetCount(exId);
            const isComplete = count >= totalSets;
            const badge = document.getElementById(`set-badge-${exId}`);
            const counter = document.getElementById(`set-count-${exId}`);
            const card = document.getElementById(`ex-card-${exId}`);
            if (badge) {
                badge.textContent = `${count}/${totalSets} set`;
                badge.classList.toggle('text-accent', count > 0);
                badge.classList.toggle('text-ink-200', count === 0);
            }
            if (counter) {
                counter.textContent = count;
                counter.classList.toggle('text-accent', count > 0);
                counter.classList.toggle('text-ink-100', count === 0);
                if (animate) {
                    counter.classList.remove('set-bump');
                    void counter.offsetWidth;
                    counter.classList.add('set-bump');
                }
            }
            if (card) card.classList.toggle('set-complete', isComplete);
        }

        function loadMeasurements() {
            try { return JSON.parse(localStorage.getItem(MEASURE_KEY) || '{}'); }
            catch { return {}; }
        }
        function saveMeasurements(data) {
            localStorage.setItem(MEASURE_KEY, JSON.stringify(data));
        }
        function todayISO() {
            const d = new Date();
            return d.toISOString().slice(0, 10);
        }
        function formatDateIT(iso) {
            const d = new Date(iso + 'T00:00:00');
            return d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        window.addMeasurement = function(metricId) {
            const input = document.getElementById(`measure-input-${metricId}`);
            const valueRaw = input.value.trim().replace(',', '.');
            const value = parseFloat(valueRaw);
            if (!Number.isFinite(value) || value < 0) {
                input.focus();
                return;
            }
            const data = loadMeasurements();
            const list = data[metricId] || [];
            list.push({ date: todayISO(), value });
            list.sort((a, b) => b.date.localeCompare(a.date));
            data[metricId] = list;
            saveMeasurements(data);
            input.value = '';
            renderMeasurements(document.getElementById('main-content'));
        };

        window.deleteMeasurement = function(metricId, idx) {
            const data = loadMeasurements();
            if (!data[metricId]) return;
            data[metricId].splice(idx, 1);
            if (data[metricId].length === 0) delete data[metricId];
            saveMeasurements(data);
            renderMeasurements(document.getElementById('main-content'));
        };

                const setBadgeHtml = !ex.isWarmup ? `<span id="set-badge-${ex.id}" class="set-badge text-[11px] font-mono px-2 py-0.5 rounded bg-elevated ${initialSetCount > 0 ? 'text-accent' : 'text-ink-200'} border border-border">${initialSetCount}/${ex.sets} set</span>` : '';
                const repsBadgeHtml = `<span class="text-[11px] font-mono px-2 py-0.5 rounded bg-elevated text-ink-200 border border-border">${ex.sets}×${ex.reps}</span>`;
                const restBadgeHtml = hasTimer ? `<span class="text-[11px] font-mono px-2 py-0.5 rounded bg-elevated text-accent border border-accent/20 inline-flex items-center gap-1">${Icon.timer}${ex.rest}s</span>` : '';

                const infoBtn = ex.tips ? `<button onclick="event.stopPropagation(); openTipsModal('${ex.id}')" aria-label="Info ${ex.name}" class="pressable w-9 h-9 rounded-lg bg-elevated border border-border text-ink-300 hover:text-accent hover:border-accent/40 flex items-center justify-center flex-shrink-0">${Icon.info}</button>` : '';
                const alertBtn = ex.variants ? `<button onclick="event.stopPropagation(); openVariantsModal('${ex.id}')" aria-label="Varianti ${ex.name}" class="pressable w-9 h-9 rounded-lg bg-warn-soft border border-warn/30 text-warn hover:bg-warn/20 flex items-center justify-center flex-shrink-0">${Icon.alert}</button>` : '';

                return `
                    <article id="ex-card-${ex.id}" class="card overflow-hidden ${isComplete ? 'set-complete' : ''}">
                        <div role="button" tabindex="0" class="w-full text-left p-4 pressable cursor-pointer" onclick="toggleDetails('${ex.id}')" aria-expanded="false" aria-controls="details-${ex.id}">
                            <div class="flex items-start gap-3">
                                <div class="w-9 h-9 rounded-lg ${badgeClasses} font-bold flex items-center justify-center flex-shrink-0 font-mono text-sm border">
                                    ${badgeText}
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h4 class="text-base font-bold text-ink-100 leading-tight">${ex.name}</h4>
                                    <div class="flex flex-wrap gap-1.5 mt-2">
                                        ${setBadgeHtml}
                                        ${repsBadgeHtml}
                                        ${restBadgeHtml}
                                        ${intensityHtml}
                                    </div>
                                </div>
                                <div class="flex items-center gap-1.5 flex-shrink-0">
                                    ${infoBtn}
                                    ${alertBtn}
                                    <span id="toggle-icon-${ex.id}" class="text-ink-400 transition-transform duration-200 w-6 h-6 flex items-center justify-center">${Icon.chevron}</span>
                                </div>
                            </div>
                        </div>

                        <div id="details-${ex.id}" class="hidden border-t border-border bg-deep/40 px-4 py-4 space-y-4">
                            <a href="${ex.videoLink}" target="_blank" rel="noopener noreferrer"
                               class="pressable inline-flex items-center justify-center gap-2 w-full sm:w-auto bg-elevated hover:bg-deep border border-border hover:border-danger/40 text-ink-100 hover:text-danger px-4 py-2.5 rounded-xl font-semibold text-sm">
                                <span class="text-danger">${Icon.play}</span>
                                Tutorial su YouTube
                            </a>

                            ${!ex.isWarmup ? `
                                <!-- Carico -->
                                <div class="card-elevated p-3 flex items-center justify-between gap-3">
                                    <div class="min-w-0">
                                        <div class="flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider text-ink-400">
                                            ${Icon.scale}<span>Carico</span>
                                        </div>
                                        <p class="text-[11px] text-ink-500 mt-0.5 leading-tight">Tieni traccia dei progressi</p>
                                    </div>
                                    <div class="flex items-stretch gap-1.5 flex-shrink-0">
                                        <button onclick="adjustLoad('${ex.id}', -2.5)" class="pressable w-9 h-11 rounded-lg bg-elevated border border-border text-ink-200 hover:text-accent hover:border-accent/40 font-bold text-lg leading-none">−</button>
                                        <input type="number" inputmode="decimal" step="0.5" id="load-${ex.id}"
                                               value="${savedLoad}"
                                               onchange="saveLoad('${dayId}', '${ex.id}', this.value)"
                                               placeholder="—"
                                               class="w-20 h-11 text-center font-mono font-bold text-base bg-deep border border-border rounded-lg text-accent placeholder:text-ink-500 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent">
                                        <button onclick="adjustLoad('${ex.id}', 2.5)" class="pressable w-9 h-11 rounded-lg bg-elevated border border-border text-ink-200 hover:text-accent hover:border-accent/40 font-bold text-lg leading-none">+</button>
                                        <span class="self-center text-xs text-ink-400 font-semibold ml-1">kg</span>
                                    </div>
                                </div>
                            ` : ''}

                            ${hasTimer && !ex.isWarmup ? `
                                <!-- Timer + Set tracker -->
                                <div class="card-elevated p-3">
                                    <div class="flex items-center justify-between gap-3">
                                        <div class="min-w-0">
                                            <div class="flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider text-ink-400">
                                                ${Icon.clock}<span>Recupero</span>
                                            </div>
                                            <p id="timer-display-${ex.id}" class="font-mono text-2xl font-bold text-ink-100 mt-0.5 leading-none">${formatTime(ex.rest)}</p>
                                        </div>
                                        <button id="btn-timer-${ex.id}" onclick="startTimer('${ex.id}', ${ex.rest}, ${ex.sets})"
                                                class="pressable inline-flex items-center gap-2 bg-accent hover:bg-accent-dark text-deep font-bold text-sm px-4 h-11 rounded-xl flex-shrink-0">
                                            <span>${Icon.bolt}</span>Avvia
                                        </button>
                                    </div>
                                    <div class="timer-track mt-3 hidden" id="bar-container-${ex.id}">
                                        <div class="timer-fill" id="bar-fill-${ex.id}"></div>
                                    </div>
                                    <div class="mt-3 pt-3 border-t border-border flex items-center justify-between gap-3">
                                        <div class="min-w-0">
                                            <div class="flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider text-ink-400">
                                                ${Icon.check}<span>Set completati</span>
                                            </div>
                                            <p class="font-mono mt-0.5 leading-none">
                                                <span id="set-count-${ex.id}" class="text-2xl font-bold ${initialSetCount > 0 ? 'text-accent' : 'text-ink-100'} inline-block">${initialSetCount}</span>
                                                <span class="text-base text-ink-400 font-semibold"> / ${ex.sets}</span>
                                            </p>
                                        </div>
                                        <div class="flex items-stretch gap-1.5 flex-shrink-0">
                                            <button onclick="adjustSets('${ex.id}', -1, ${ex.sets})" class="pressable w-9 h-11 rounded-lg bg-elevated border border-border text-ink-200 hover:text-accent hover:border-accent/40 font-bold text-lg leading-none">−</button>
                                            <button onclick="adjustSets('${ex.id}', 1, ${ex.sets})" class="pressable w-9 h-11 rounded-lg bg-elevated border border-border text-ink-200 hover:text-accent hover:border-accent/40 font-bold text-lg leading-none">+</button>
                                        </div>
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </article>
                `;
            }).join('');

            const totalCompleted = day.exercises.filter(e => !e.isWarmup).reduce((s, e) => s + getSetCount(e.id), 0);
            const totalRequired = day.exercises.filter(e => !e.isWarmup).reduce((s, e) => s + e.sets, 0);
            const allDone = totalRequired > 0 && totalCompleted >= totalRequired;

            const closeBtn = totalCompleted > 0 ? `
                <button onclick="closeWorkout('${dayId}')"
                        class="pressable w-full inline-flex items-center justify-center gap-2 ${allDone ? 'bg-accent hover:bg-accent-dark text-deep shadow-glow-accent' : 'bg-elevated hover:bg-deep text-ink-100 border border-border hover:border-accent/40'} font-bold text-sm px-4 h-12 rounded-xl mt-4">
                    <span class="${allDone ? '' : 'text-accent'}">${Icon.check}</span>
                    ${allDone ? `Allenamento completato · Chiudi (${totalCompleted}/${totalRequired})` : `Chiudi allenamento (${totalCompleted}/${totalRequired})`}
                </button>
            ` : '';

            const dayLabel = dayId.replace('day', 'Giorno ');

            container.innerHTML = `
                <section class="fade-in space-y-5">
                    <div class="card-elevated p-5">
                        <div class="text-[11px] font-semibold uppercase tracking-wider text-accent">${dayLabel}</div>
                        <h2 class="text-2xl font-extrabold text-ink-100 leading-tight mt-1">${day.title}</h2>
                        <p class="text-sm text-ink-300 leading-relaxed mt-3">${day.intro}</p>
                    </div>
                    <div class="space-y-3">
                        ${exercisesHtml}
                    </div>
                    ${closeBtn}
                </section>
            `;
        }

        // ============================================================
        //  RENDER: MEASUREMENTS
        // ============================================================
        function renderMeasurements(container) {
            const data = loadMeasurements();

            const cards = measurementDefs.map(m => {
                const entries = data[m.id] || [];
                const latest = entries[0];
                const history = entries.slice(0, 5).map((e, i) => `
                    <li class="flex items-center justify-between gap-2 py-1.5 ${i > 0 ? 'border-t border-border/60' : ''}">
                        <span class="text-xs font-mono text-ink-400 inline-flex items-center gap-1.5">${Icon.calendar}${formatDateIT(e.date)}</span>
                        <div class="flex items-center gap-2">
                            <span class="text-sm font-mono font-bold ${i === 0 ? 'text-accent' : 'text-ink-200'}">${e.value}<span class="text-ink-400 font-normal ml-0.5 text-xs">${m.unit}</span></span>
                            <button onclick="deleteMeasurement('${m.id}', ${i})" aria-label="Elimina" class="pressable text-ink-500 hover:text-danger w-6 h-6 flex items-center justify-center">${Icon.trash}</button>
                        </div>
                    </li>
                `).join('');

                return `
                    <div class="card p-5">
                        <div class="flex items-start justify-between gap-3 mb-3">
                            <div class="min-w-0">
                                <h3 class="text-sm font-bold text-ink-100 leading-tight">${m.name}</h3>
                                <p class="text-[11px] text-ink-400 mt-0.5">Unità: ${m.unit}</p>
                            </div>
                            ${latest ? `
                                <div class="text-right flex-shrink-0">
                                    <p class="font-mono text-2xl font-extrabold text-accent leading-none">${latest.value}<span class="text-base text-ink-400 font-normal ml-1">${m.unit}</span></p>
                                    <p class="text-[10px] text-ink-400 font-mono mt-1">${formatDateIT(latest.date)}</p>
                                </div>
                            ` : `
                                <div class="text-right flex-shrink-0">
                                    <p class="text-xs text-ink-500 italic">Nessun dato</p>
                                </div>
                            `}
                        </div>

                        <div class="flex items-stretch gap-2 mb-3">
                            <input type="number" inputmode="decimal" step="0.5" id="measure-input-${m.id}"
                                   placeholder="Nuovo valore"
                                   class="flex-1 h-11 px-3 font-mono font-semibold text-sm bg-deep border border-border rounded-lg text-ink-100 placeholder:text-ink-500 focus:outline-none focus:border-accent focus:ring-1 focus:ring-accent"
                                   onkeypress="if(event.key==='Enter') addMeasurement('${m.id}')">
                            <button onclick="addMeasurement('${m.id}')"
                                    class="pressable inline-flex items-center justify-center gap-1.5 bg-accent hover:bg-accent-dark text-deep font-bold text-sm px-4 h-11 rounded-lg flex-shrink-0">
                                ${Icon.plus}<span>Salva</span>
                            </button>
                        </div>

                        ${entries.length > 0 ? `
                            <details class="text-xs">
                                <summary class="cursor-pointer text-ink-400 hover:text-ink-200 inline-flex items-center gap-1 select-none">${Icon.chevron}<span>Storico (${entries.length})</span></summary>
                                <ul class="mt-2 list-none">${history}</ul>
                            </details>
                        ` : ''}
                    </div>
                `;
            }).join('');

            container.innerHTML = `
                <section class="fade-in space-y-5">
                    <div class="card-elevated p-5">
                        <h2 class="text-xl font-bold text-ink-100 leading-tight">Misurazioni</h2>
                        <p class="text-sm text-ink-300 mt-1 leading-relaxed">Le 5 metriche di riferimento del ciclo. La data viene impostata in automatico al salvataggio.</p>
                    </div>
                    <div class="space-y-3">${cards}</div>
                </section>
            `;
        }

        // ============================================================
        //  VIEW SWITCH
        // ============================================================
        function switchView(viewId) {
            currentView = viewId;
            currentDayId = viewId.startsWith('day') ? viewId : null;

            document.querySelectorAll('.bottom-tab').forEach(b => b.setAttribute('aria-selected', 'false'));
            const activeTab = document.getElementById(`tab-${viewId}`);
            if (activeTab) activeTab.setAttribute('aria-selected', 'true');

            Object.values(activeTimers).forEach(clearInterval);
            activeTimers = {};

            const main = document.getElementById('main-content');
            main.innerHTML = '';

            if (viewId === 'overview')          renderOverview(main);
            else if (viewId === 'measurements') renderMeasurements(main);
            else if (viewId.startsWith('day'))  renderDay(viewId, main);

            window.scrollTo({ top: 0, behavior: 'instant' });
        }
        window.switchView = switchView;

        // ============================================================
        //  EXERCISE INTERACTIONS
        // ============================================================
        window.saveLoad = function(dayId, exId, value) {
            localStorage.setItem(`beachVolleyApp_${program.id}_${dayId}_${exId}`, value);
        };

        window.adjustLoad = function(exId, delta) {
            const input = document.getElementById(`load-${exId}`);
            if (!input || input.disabled) return;
            const current = parseFloat(input.value) || 0;
            const next = Math.max(0, current + delta);
            input.value = Number.isInteger(next) ? next : next.toFixed(1).replace(/\.0$/, '');
            input.dispatchEvent(new Event('change'));
        };

        window.toggleDetails = function(exId) {
            const details = document.getElementById(`details-${exId}`);
            const icon = document.getElementById(`toggle-icon-${exId}`);
            const btn = icon?.closest('[role="button"]');
            if (details.classList.contains('hidden')) {
                details.classList.remove('hidden');
                details.classList.add('expand-in');
                icon.style.transform = 'rotate(180deg)';
                btn?.setAttribute('aria-expanded', 'true');
            } else {
                details.classList.add('hidden');
                details.classList.remove('expand-in');
                icon.style.transform = 'rotate(0deg)';
                btn?.setAttribute('aria-expanded', 'false');
            }
        };

        window.closeWorkout = function(dayId) {
            const day = program.days[dayId];
            if (!day) return;
            const totalCompleted = day.exercises.filter(e => !e.isWarmup).reduce((s, e) => s + getSetCount(e.id), 0);
            if (totalCompleted === 0) return;
            const msg = `Chiudere l'allenamento di oggi?\n\n${totalCompleted} set completati verranno azzerati per la prossima sessione.`;
            if (!confirm(msg)) return;
            day.exercises.forEach(ex => { delete setProgress[ex.id]; });
            renderDay(dayId, document.getElementById('main-content'));
        };

        // ============================================================
        //  TIMER
        // ============================================================
        function formatTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = seconds % 60;
            return `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        window.startTimer = function(exId, totalSeconds, totalSets) {
            if (activeTimers[exId]) clearInterval(activeTimers[exId]);

            getAudioCtx();
            acquireWakeLock();

            const startTime = Date.now();
            const endTime = startTime + totalSeconds * 1000;
            let warned = false;
            let completed = false;

            const display = document.getElementById(`timer-display-${exId}`);
            const btn = document.getElementById(`btn-timer-${exId}`);
            const barContainer = document.getElementById(`bar-container-${exId}`);
            const barFill = document.getElementById(`bar-fill-${exId}`);

            btn.innerHTML = `${Icon.stop}Ferma`;
            btn.classList.remove('bg-accent', 'hover:bg-accent-dark');
            btn.classList.add('bg-danger', 'hover:bg-red-600');
            btn.onclick = () => stopTimer(exId, totalSeconds, totalSets);

            barContainer.classList.remove('hidden');
            barFill.style.transition = 'none';
            barFill.style.width = '0%';
            void barFill.offsetWidth;
            barFill.style.transition = 'width 1s linear';

            display.classList.remove('text-accent', 'ready-pulse');
            display.classList.add('text-ink-100');
            display.textContent = formatTime(totalSeconds);

            function tick() {
                const now = Date.now();
                const timeLeft = Math.max(0, Math.ceil((endTime - now) / 1000));
                display.textContent = formatTime(timeLeft);
                const pct = Math.min(100, ((totalSeconds - timeLeft) / totalSeconds) * 100);
                barFill.style.width = `${pct}%`;
                if (!warned && timeLeft <= 10 && timeLeft > 5 && totalSeconds > 12) {
                    warned = true;
                    beepWarning();
                    if (navigator.vibrate) navigator.vibrate(80);
                }
                if (!completed && timeLeft <= 0) {
                    completed = true;
                    clearInterval(activeTimers[exId]);
                    delete activeTimers[exId];
                    display.textContent = 'PRONTO';
                    display.classList.remove('text-ink-100');
                    display.classList.add('text-accent', 'ready-pulse');
                    beepReady();
                    if (navigator.vibrate) navigator.vibrate([100, 60, 100, 60, 200]);
                    incrementSet(exId, totalSets);
                    maybeReleaseWakeLock();
                    setTimeout(() => resetTimerUI(exId, totalSeconds, true, totalSets), 1500);
                }
            }
            tick();
            activeTimers[exId] = setInterval(tick, 1000);
        };

        function stopTimer(exId, originalRest, totalSets) {
            if (activeTimers[exId]) {
                clearInterval(activeTimers[exId]);
                delete activeTimers[exId];
            }
            maybeReleaseWakeLock();
            resetTimerUI(exId, originalRest, false, totalSets);
        }

        function resetTimerUI(exId, originalRest, keepReady, totalSets) {
            const display = document.getElementById(`timer-display-${exId}`);
            const btn = document.getElementById(`btn-timer-${exId}`);
            const barContainer = document.getElementById(`bar-container-${exId}`);
            if (!keepReady) {
                display.textContent = formatTime(originalRest);
                display.classList.remove('text-accent', 'ready-pulse');
                display.classList.add('text-ink-100');
            }
            btn.innerHTML = `${Icon.bolt}Avvia`;
            btn.classList.remove('bg-danger', 'hover:bg-red-600');
            btn.classList.add('bg-accent', 'hover:bg-accent-dark');
            btn.onclick = () => startTimer(exId, originalRest, totalSets);
            setTimeout(() => barContainer?.classList.add('hidden'), 800);
        }

        // ============================================================
        //  INIT
        // ============================================================
        window.onload = () => switchView('overview');

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .catch(err => console.warn('Service Worker non registrato:', err));
            });
        }
    </script>
</body>
</html>
